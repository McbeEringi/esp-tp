<!DOCTYPE html>
<html><head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<style>
		:root{font-family:monospace;--bc:#fff;--fc:#000;background-color:var(--bc);color:var(--fc);}
		@media(prefers-color-scheme:dark){:root{--bc:#223;--fc:#fff;}}
		textarea{width:100%;height:32ex;resize:none;background-color:inherit;color:inherit;box-sizing:border-box;}
	</style>
</head><body>
	<h1>esp-tp</h1>
	<hr>
	<label>font width :<input type="range" id="fwidth" min="0" max="7" value="0"></label><br>
	<label>font height:<input type="range" id="fheight" min="0" max="7" value="0"></label><br>
	<label>align:<input type="range" id="align" min="0" max="2" value="0"></label><br>
	<button id="cutbtn">cut</button>
	<hr>
	<textarea id="txt"></textarea><br><br>
	<button id="trun">send txt</button><br>
	<hr>
	<label>source:<input type="file" id="img" accept="image/*"></label><br>
	<label>mode:<select id="imode">
		<option value="0">none</option>
		<option value="1">Bayer</option>
		<option value="2" selected>Floyd-Steinberg</option>
		<option value="3">Atkinson</option>
	</select></label><br>
	<label>rotate:<input type="range" id="irotate" min="-4" max="4"></label><br>
	<label> scale:<input type="range" id="iscale" min="0" max="1" step="0.25" value="1"></label><br><br>
	<button id="irun">send img</button><br>
	<canvas id="c"></canvas>
	<hr>
	<script type="module">
		import{WSPrint}from'./modules/wsprint.mjs';
		import{txt2bin}from'./modules/txt2bin.mjs';
		import{img2bin}from'./modules/img2bin.mjs';
		import{cmd2bin}from'./modules/cmd2bin.mjs';

		self.ws=new WSPrint('/ws').open();
		self.ctx=c.getContext('2d');

		ws.event.addEventListener('open',_=>console.log('open'));
		ws.event.addEventListener('close',_=>console.log('close'));
		ws.event.addEventListener('send',({detail:x})=>console.log(x));
		ws.event.addEventListener('msg',({detail:{data:x}})=>console.log(x));
		ws.event.addEventListener('idle',_=>console.log('idle'));

		fwidth.onchange=fheight.onchange=_=>ws.send([...cmd2bin('GS !'),fwidth.value<<4|fheight.value]);
		align.onchange=_=>ws.send([...cmd2bin('ESC a'),align.value]);
		cutbtn.onclick=_=>ws.send(cmd2bin('GS V 00'));

		trun.onclick=_=>ws.send(txt2bin(txt.value));

		iscale.onchange=({target:e})=>+e.value||(e.value=e.step);
		irun.onclick=_=>[...img.files].map(async x=>(
			x=await new Promise((f,r)=>Object.assign(new Image(),{
				src:URL.createObjectURL(x),
				onload:({target:x})=>f(x),onerror:r
			})),
			URL.revokeObjectURL(x.src),
			
			x=img2bin({
				genctx:(w,h)=>new OffscreenCanvas(w,h).getContext('2d'),
				// genctx:(w,h)=>(c=>(
				// 	Object.assign(c,{width:w,height:h}),
				// 	document.body.append(c),
				// 	c.getContext('2d')
				// ))(document.createElement('canvas')),
				img:x,dither_mode:imode.value,
				transform:{rotate:Math.PI/4*irotate.value,scale:iscale.value}
			}),

			x.size.forEach((x,i)=>ctx.canvas[['width','height'][i]]=x),
			ctx.putImageData(new ImageData(new Uint8ClampedArray(x.data.flatMap(x=>[x,x,x,255])),...x.size),0,0),

			ws.send(x)
		))
	</script>
</body></html>
